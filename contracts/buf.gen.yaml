version: v2
clean: true
plugins:
  # TypeScript — web client (Next.js) via ts-proto for nice-grpc compatibility
  - local: protoc-gen-ts_proto
    out: ../web/generated/proto
    opt:
      - outputServices=nice-grpc
      - outputServices=generic-definitions
      - esModuleInterop=true
      - env=node
      - useOptionals=messages
      - useDate=string

  # Dart — mobile client (Flutter)
  - local: protoc-gen-dart
    out: ../app/lib/generated/proto
    opt:
      - grpc

  # Rust — backend services
  # Not generated via buf; tonic-build in services/*/build.rs reads protos directly.
  # See services/api/build.rs for the tonic-build configuration.

inputs:
  - directory: .
